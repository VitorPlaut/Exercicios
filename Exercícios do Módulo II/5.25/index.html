<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet"
    />
    <style>
      body {
        font-family: "sono", sans-serif;
      }

      .pricing-container{
        display: flex;
        justify-content: center;
        align-items: center; 
        font-size: larger;
        gap: 20px;
        height: 100vh;

      }

      .pricing-plan{
        border-radius: 5%;
        background-color: rgb(223, 223, 223);
        padding: 2%;

      }

      .plan-title{
        font-weight: bold;
        font-style: italic;
        text-align: center; 
      }

      .plan-price{
        text-align: center;
        font-size: 30px;
        font-weight: bold;
      }

      .plan-button{
        margin-left: 33%;
        color: rgb(250, 246, 246);
        background-color:rgb(237, 112, 62);
        border-radius: 15px;
      }

      @media (max-width: 1250px) {
        .pricing-container{
        display: inline-block;
        justify-content: center;
        align-items: center; 
        font-size: larger;
        margin-left: 30%;
        gap: 20px;
        height: 100vh;
      }

       .pricing-plan{
        background-color: rgb(223, 223, 223);
        padding: 7%;
        margin-top: 20%;
        border-radius: 30px;

      }
      }

      
    </style>
  </head>

  <body>
    <div class="pricing-container">
      <div class="pricing-plan">
        <div class="plan-title">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <p>✅ 10GB Storage</p>
          <p>✅ 1 User</p>
          <p>🚫 Support</p>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <p>✅ 50GB Storage</p>
          <p>✅ 5 Users</p>
          <p>✅ Phone &amp; Email Support</p>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <p>✅ 100GB Storage</p>
          <p>✅ 10 Users</p>
          <p>✅ 24/7 Support</p>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
